    { key = "Y", mode = "Vi|~Search", action = "ReceiveChar" },
    { key = "Copy", mode = "Vi|~Search", action = "ReceiveChar" },
    { key = "Y", mods = "Shift", mode = "Vi|~Search", action = "ReceiveChar" },
