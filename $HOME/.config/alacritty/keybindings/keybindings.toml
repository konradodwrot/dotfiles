#> key definitions - https://docs.rs/winit/latest/winit/keyboard/enum.NamedKey.html

[keyboard]
bindings = [
    # copy paste
    { key = "Paste", action = "Paste" },
    { key = "V", mods = "Command", action = "Paste" },
    { key = "Copy", action = "Copy" },
    { key = "C", mods = "Command", action = "Copy" },
    # search
    { key = "F", mods = "Command", mode = "~Search", action = "SearchForward" },
    { key = "Escape", mode = "Search", action = "SearchCancel" },
    { key = "Backspace", mods = "Alt", mode = "Search", action = "SearchDeleteWord" },
    { key = "Enter", mode = "Search", action = "SearchFocusNext" },
    { key = "Enter", mods = "Shift", mode = "Search", action = "SearchFocusPrevious" },
    # font size
    { key = "=", mods = "Command", action = "IncreaseFontSize" },
    { key = "-", mods = "Command", action = "DecreaseFontSize" },

    { key = "F", mods = "Command|Control", action = "ToggleFullscreen" },
    { key = "PageUp", action = "ScrollHalfPageUp" },
    { key = "PageDown", action = "ScrollHalfPageDown" },
    { key = "W", mods = "Shift|Command", action = "Quit" },
    { key = "N", mods = "Command", action = "CreateNewWindow" },

    # tmux map, prefix = ^B
    { key = "T", mods = "Command", chars = "\u0002t" },                     # split window - new pane
    { key = "W", mods = "Command", chars = "\u0002w" },                     # kill pane
    { key = "ArrowRight", mods = "Command|Alt", chars = "\u0002\u001B[C" }, # pane navigation right
    { key = "ArrowLeft", mods = "Command|Alt", chars = "\u0002\u001B[D" },  # pane navigation left
    { key = "ArrowDown", mods = "Command|Alt", chars = "\u0002\u001B[B" },  # pane navigation down
    { key = "ArrowUp", mods = "Command|Alt", chars = "\u0002\u001B[A" },    # pane navigation up
    { key = "=", mods = "Command|Alt", chars = "\u0002p" },                 # expand pane
    { key = "-", mods = "Command|Alt", chars = "\u0002m" },                 # bring back layout (revert expand pane)

    # zsh

    ## arrows
    { key = "ArrowUp", action = "ReceiveChar" },
    { key = "ArrowDown", action = "ReceiveChar" },
    { key = "ArrowRight", action = "ReceiveChar" },
    { key = "ArrowLeft", action = "ReceiveChar" },

    { key = "ArrowUp", action = "ReceiveChar", mods = "Command" },
    { key = "ArrowDown", action = "ReceiveChar", mods = "Command" },
    { key = "ArrowRight", action = "ReceiveChar", mods = "Command" },
    { key = "ArrowLeft", action = "ReceiveChar", mods = "Command" },

    { key = "ArrowUp", action = "ReceiveChar", mods = "Alt" },
    { key = "ArrowDown", action = "ReceiveChar", mods = "Alt" },
    { key = "ArrowRight", action = "ReceiveChar", mods = "Alt" },
    { key = "ArrowLeft", action = "ReceiveChar", mods = "Alt" },

    ## deletions
    { key = "Delete", action = "ReceiveChar" },
    { key = "Delete", action = "ReceiveChar", mods = "Command" },
    { key = "Delete", action = "ReceiveChar", mods = "Alt" },

    { key = "Backspace", action = "ReceiveChar" },
    { key = "Backspace", chars = "\u0090\u007F", mods = "Command", mode = "~Alt" },
    { key = "Backspace", action = "ReceiveChar" , mods = "Alt" },

    { key = "Numpad0", chars = "\u001A" },          # ^Z - Suspend
    { key = "NumpadSubtract", chars = "\u001C" },   # ^\ - Quit
    { key = "NumpadEnter", chars = "\u0014" },      # ^T - Status
    { key = "NumpadDecimal", chars = "\u0003" },    # ^C - Interrupt

    ## other
    { key = "Z", chars = "\u0090z", mods = "Command", mode = "~Alt" },
    { key = "Z", chars = "\u0090Z", mods = "Command|Shift", mode = "~Alt" },
    { key = "X", chars = "\u0090x", mods = "Command", mode = "~Alt" },

    { key = "Enter", mods = "Shift", chars = "\n" },
    { key = "Enter", mods = "Alt", chars = "\n" },
    { key = "Enter", mods = "Command", chars = "\n" },
    { key = "Enter", mods = "Control", chars = "\n" }
]
